version: '3.9'

services:

  # =============================================
  # PostgreSQL
  # =============================================
  postgres:
    image: postgres:16-alpine
    container_name: imoblex-postgres
    environment:
      POSTGRES_DB: imoblex
      POSTGRES_USER: imoblex
      POSTGRES_PASSWORD: imoblex2024
    volumes:
      - postgres_data:/var/lib/postgresql/data
    ports:
      - "5432:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U imoblex"]
      interval: 10s
      timeout: 5s
      retries: 5
    restart: unless-stopped

  # =============================================
  # Redis (cache)
  # =============================================
  redis:
    image: redis:7-alpine
    container_name: imoblex-redis
    command: redis-server --appendonly yes
    volumes:
      - redis_data:/data
    ports:
      - "6379:6379"
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5
    restart: unless-stopped

  # =============================================
  # MinIO (stockage fichiers)
  # =============================================
  minio:
    image: minio/minio:latest
    container_name: imoblex-minio
    command: server /data --console-address ":9001"
    environment:
      MINIO_ROOT_USER: minioadmin
      MINIO_ROOT_PASSWORD: minioadmin
    volumes:
      - minio_data:/data
    ports:
      - "9000:9000"   # API
      - "9001:9001"   # Console web
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:9000/minio/health/live"]
      interval: 30s
      timeout: 20s
      retries: 3
    restart: unless-stopped

  # =============================================
  # Spring Boot Backend
  # =============================================
  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: imoblex-backend
    environment:
      SPRING_PROFILES_ACTIVE: docker
      DB_USER: imoblex
      DB_PASSWORD: imoblex2024
      REDIS_HOST: redis
      MINIO_URL: http://minio:9000
      JWT_SECRET: imoblexSecretKey2024VeryLongAndSecureKeyForJWTProduction
    ports:
      - "8080:8080"
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
      minio:
        condition: service_healthy
    restart: unless-stopped

  # =============================================
  # Nginx (reverse proxy)
  # =============================================
  nginx:
    image: nginx:alpine
    container_name: imoblex-nginx
    volumes:
      - ./nginx/nginx.conf:/etc/nginx/nginx.conf:ro
      - ./nginx/ssl:/etc/nginx/ssl:ro
    ports:
      - "80:80"
      - "443:443"
    depends_on:
      - backend
    restart: unless-stopped

volumes:
  postgres_data:
  redis_data:
  minio_data:
