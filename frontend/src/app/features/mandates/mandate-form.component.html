<div class="form-page">
  <div class="page-header">
    <a routerLink="/mandates" class="breadcrumb-link">
      <i class="pi pi-arrow-left"></i> Mandats
    </a>
  </div>
  <div class="card">
    <h2 class="card-title">Nouveau mandat</h2>

    @if (errorMessage()) {
      <div class="alert alert-error">
        <i class="pi pi-exclamation-circle"></i> {{ errorMessage() }}
      </div>
    }
    @if (successMessage()) {
      <div class="alert alert-success">
        <i class="pi pi-check-circle"></i> {{ successMessage() }}
      </div>
    }

    <div class="form-grid">
      <div class="form-group">
        <label class="form-label">Type de mandat *</label>
        <select class="form-input" [(ngModel)]="formData.type" name="type">
          <option value="" disabled>Choisir un type...</option>
          <option value="EXCLUSIVE">Exclusif</option>
          <option value="SIMPLE">Simple</option>
          <option value="SEMI_EXCLUSIVE">Semi-exclusif</option>
        </select>
      </div>

      <div class="form-group">
        <label class="form-label">Type de transaction</label>
        <select class="form-input" [(ngModel)]="formData.transactionType" name="transactionType">
          <option value="SALE">Vente</option>
          <option value="RENTAL">Location</option>
        </select>
      </div>

      <div class="form-group">
        <label class="form-label">ID du bien immobilier</label>
        <input type="text" class="form-input"
          [(ngModel)]="formData.propertyId" name="propertyId"
          placeholder="UUID du bien (optionnel)" />
      </div>

      <div class="form-group">
        <label class="form-label">ID du mandant (contact)</label>
        <input type="text" class="form-input"
          [(ngModel)]="formData.mandatorId" name="mandatorId"
          placeholder="UUID du contact mandant (optionnel)" />
      </div>

      <div class="form-group">
        <label class="form-label">Prix mandaté (€) *</label>
        <input type="number" class="form-input"
          [(ngModel)]="formData.price" name="price"
          placeholder="350000" min="0" />
      </div>

      <div class="form-group">
        <label class="form-label">Honoraires agence (%)</label>
        <input type="number" class="form-input"
          [(ngModel)]="formData.agencyFeesPercent" name="agencyFeesPercent"
          placeholder="5" step="0.5" min="0" max="20" />
      </div>

      <div class="form-group">
        <label class="form-label">Date de début *</label>
        <input type="date" class="form-input"
          [(ngModel)]="formData.startDate" name="startDate" />
      </div>

      <div class="form-group">
        <label class="form-label">Date de fin *</label>
        <input type="date" class="form-input"
          [(ngModel)]="formData.endDate" name="endDate" />
      </div>

      <div class="form-group" style="grid-column: 1/-1">
        <label class="form-label">Notes</label>
        <textarea class="form-input"
          [(ngModel)]="formData.notes" name="notes"
          rows="3"
          placeholder="Conditions particulières, observations..."></textarea>
      </div>
    </div>

    <div class="form-actions">
      <a routerLink="/mandates" class="btn-secondary">Annuler</a>
      <button class="btn-primary" (click)="onSave()" [disabled]="loading() || !isValid()">
        <i class="pi"
          [class.pi-spin]="loading()"
          [class.pi-spinner]="loading()"
          [class.pi-check]="!loading()"></i>
        {{ loading() ? 'Création en cours...' : 'Créer le mandat' }}
      </button>
    </div>
  </div>
</div>
