<header class="header header--solid">
  <div class="container-fluid">
    <div class="flex items-center justify-between h-24">

      <!-- Logo -->
      <a routerLink="/" class="flex items-center group">
        <div class="transition-all duration-300 group-hover:scale-105">
          <img src="assets/logo.png" alt="Imoblex" class="h-16 w-auto" />
        </div>
      </a>

      <!-- Desktop Navigation -->
      <nav class="hidden lg:flex items-center gap-8">
        <a routerLink="/vente" routerLinkActive="active" class="nav-link text-primary">Vente</a>
        <a routerLink="/location" routerLinkActive="active" class="nav-link text-primary">Location</a>
        <a routerLink="/estimation" routerLinkActive="active" class="nav-link text-primary">Estimation</a>
        <a routerLink="/simulateur-pret" routerLinkActive="active" class="nav-link text-primary">Simulateur</a>
        <a routerLink="/agence" routerLinkActive="active" class="nav-link text-primary">L'agence</a>
        <a routerLink="/contact" class="btn-accent text-sm px-5 py-2.5 rounded-lg">Contact</a>
      </nav>

      <!-- Mobile Menu Toggle -->
      <button class="lg:hidden flex flex-col gap-1.5 p-2 group" (click)="toggleMobileMenu()" aria-label="Menu">
        <span class="block w-6 h-0.5 bg-primary transition-all duration-300"
              [class.rotate-45]="mobileMenuOpen()" [class.translate-y-2]="mobileMenuOpen()"></span>
        <span class="block w-6 h-0.5 bg-primary transition-all duration-300"
              [class.opacity-0]="mobileMenuOpen()"></span>
        <span class="block w-6 h-0.5 bg-primary transition-all duration-300"
              [class.-rotate-45]="mobileMenuOpen()" [class.-translate-y-2]="mobileMenuOpen()"></span>
      </button>
    </div>
  </div>

  <!-- Mobile Menu -->
  <div class="mobile-menu" [class.is-open]="mobileMenuOpen()">
    <div class="flex items-center justify-between px-6 h-20 border-b border-white/10">
      <a routerLink="/" class="flex items-center" (click)="closeMobileMenu()">
        <img src="assets/logo.png" alt="Imoblex" class="h-10 w-auto" />
      </a>
      <button class="text-white p-2" (click)="closeMobileMenu()">
        <svg class="w-6 h-6" fill="none" stroke="currentColor" viewBox="0 0 24 24">
          <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M6 18L18 6M6 6l12 12"/>
        </svg>
      </button>
    </div>

    <nav class="flex flex-col px-6 pt-8 gap-1">
      @for (item of navItems; track item.path) {
        <a [routerLink]="item.path" routerLinkActive="text-accent"
           class="text-white/80 hover:text-white text-xl font-medium py-4 border-b border-white/10 transition-colors"
           (click)="closeMobileMenu()">
          {{ item.label }}
        </a>
      }
    </nav>

    <div class="px-6 mt-8">
      <a routerLink="/contact" class="btn-accent w-full text-center text-lg py-4 rounded-xl" (click)="closeMobileMenu()">
        Nous contacter
      </a>
    </div>

    <div class="px-6 mt-auto mb-8 pt-8">
      <p class="text-white/50 text-sm">📞 05.61.61.57.38</p>
      <p class="text-white/50 text-sm mt-1">✉️ contact&#64;imoblex.fr</p>
    </div>
  </div>
</header>
